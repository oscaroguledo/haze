version: '3.8'

services:
  frontend:
    build:
      context: ./my-app
    ports:
      - "3000:3000"
    volumes:
      - ./my-app:/app
    command: npm start
    environment:
      - CHOKIDAR_USEPOLLING=true # To avoid file changes not detected in Docker
    depends_on:
      - backend

  backend:
    build:
      context: ./backend
    ports:
      - "8080:8080"

    volumes:
      - ./backend:/app
    command: cargo build
    environment:
      - DATABASE_URL=postgres://postgres:password@db:5432/mydatabase
    depends_on:
      - db

  db:
    image: postgres:15
    container_name: postgres_db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: mydatabase
    ports:
      - "5432:5432"
